experiment:
  id: exp02_cf_cloth
  output_root: outputs
  init_checkpoint: null

data:
  root: /data/project/dataset
  mannequin_dir: mannequin
  human_dir: human
  cache_dir: cache_mcic
  split_seed: 42
  train_ratio: 0.8
  val_ratio: 0.1

image:
  height: 512
  width: 512
  interpolation_image: bicubic
  interpolation_mask: nearest
  center_crop: false
  pad_to_aspect_ratio: true
  pad_value: 255

model:
  base_model: diffusers/stable-diffusion-xl-1.0-inpainting-0.1
  prompt: a photorealistic human model wearing the same garment
  mannequin_encoder: openai/clip-vit-large-patch14
  mannequin_tokens: 16
  identity_tokens: 4
  identity_embedding_dim: 512
  lora_rank: 16
  lora_alpha: 16
  enable_xformers: false

identity:
  backend: facenet
  embedding_dim: 512

training:
  seed: 42
  max_steps: 10000
  batch_size_per_gpu: 1
  gradient_accumulation: 8
  learning_rate: 0.0001
  mixed_precision: bf16
  gradient_checkpointing: true
  checkpoint_every: 1000
  log_every: 10
  num_workers: 2
  editable_loss_weight: 1.0
  context_loss_weight: 0.1

cf:
  enabled: true
  timestep_min: 20
  timestep_max: 500
  identity_loss_enabled: false

loss:
  lambda_pair: 1.0
  lambda_cf_max: 0.2
  lambda_cloth: 1.0
  lambda_id: 0.0
  lambda_tri: 0.0
  triplet_margin: 0.25

data:
  root: /data/project/dataset
  mannequin_dir: mannequin
  human_dir: human
  cache_dir: cache_mcic
  split_seed: 42
  train_ratio: 0.8
  val_ratio: 0.1

image:
  height: 512
  width: 512
  interpolation_image: bicubic
  interpolation_mask: nearest
  center_crop: false
  pad_to_aspect_ratio: true
  pad_value: 255

preprocess:
  # heuristic is for pipeline smoke tests. Set backend: label_maps with parser outputs for experiments.
  parsing_backend: heuristic
  parsing_dir: null
  label_ids:
    face: [1]
    hair: [2]
    cloth: [3, 4, 5, 6]
    person: [1, 2, 3, 4, 5, 6, 7]
  boundary_dilate_radius: 7
  cloth_erode_radius: 3
  max_visual_checks: 200

identity:
  # mock is deterministic and differentiable for smoke tests; use facenet for research runs.
  backend: mock
  embedding_dim: 512
  min_face_size: 20

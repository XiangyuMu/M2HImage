experiment:
  id: phase1_warmup_b2
  output_root: /data/muxiangyu/datasets/M2HImage/M2H_Final_v2/phase1
  seed: 20260706
  wandb: false
  wandb_project: M2H-Phase1
  wandb_run_id: phase1_warmup_b2

data:
  root: /data/muxiangyu/datasets/M2HImage/M2H_Final_v2
  train_split: splits/train.txt
  val_split: splits/val.txt
  test_split: splits/test.txt
  cache_dir: phase1/cache_512
  cf_subset: eval/cf_subset.json
  resolution: 512
  prompt: a photorealistic human wearing the same garment, same body pose, natural skin and hair

model:
  base: /data/muxiangyu/pythonPrograms/M2HImage/models/hf/black-forest-labs/FLUX.1-dev
  controlnet: /data/muxiangyu/pythonPrograms/M2HImage/models/hf/InstantX/FLUX.1-dev-Controlnet-Union
  control_mode: 4
  controlnet_scale: 0.75
  local_files_only: true
  precision: bf16
  lora_rank: 16
  identity_adapter:
    type: flux_dual_identity_adapter
    version: phase1-local-2026-07-06
    id_dim: 512
    appearance_dim: 1024
    garment_dim: 1024
    token_dim: 4096
    id_tokens: 4
    appearance_tokens: 4
    garment_tokens: 8
    pose_tokens: 1
    dropout: 0.0
  gradient_checkpointing:
    enabled: true
    transformer_block_ratio: 1.0
  compile: false
  load_vae_in_train: false

cache:
  dtype: bf16
  require_coverage: true
  num_workers: 4
  clip_vision_model: /data/muxiangyu/pythonPrograms/M2HImage/models/local/clip-vit-large-patch14
  arcface_model_root: /data/muxiangyu/modelLibrary/insightface
  arcface_helper_python: /home/muxiangyu/miniconda3/envs/imagdressing_m2h/bin/python
  arcface_helper_script: /data/muxiangyu/pythonPrograms/M2HImage/tools/arcface_embed_server.py
  heldout_face_model: /data/muxiangyu/modelLibrary/insightface/models/antelopev2

training:
  total_steps: 6000
  baseline_lr: 5.0e-5
  baseline_global_batch: 16
  micro_batch: 1
  auto_micro_batch_probe: true
  preferred_micro_batch: 2
  grad_accum: auto
  max_grad_norm: 1.0
  optimizer: paged_adamw8bit
  num_workers_per_rank: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  checkpoint_every: 500
  log_every: 10
  benchmark_steps: 20
  save_final: true
  resume: null

eval:
  watcher_poll_seconds: 30
  watcher_device: cuda:3
  fixed_val_count: 8
  identity_swap_count: 2
  generate_steps: 20
  guidance_scale: 3.5
  b2_mannequin_count: 50
  b2_identity_pool: 20
  b2_identities_per_mannequin: 4
  b2_seeds: [0, 1]
  b2_output_dir: eval/b2_gen
  report_path: eval/b2_report.md
